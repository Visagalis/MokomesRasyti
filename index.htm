      }]
    };
    
    const manifestString = JSON.stringify(manifest);
    const manifestUrl = 'data:application/manifest+json;charset=utf-8,' + encodeURIComponent(manifestString);
    const link = document.createElement('link');
    link.rel = 'manifest';
    link.href = manifestUrl;
    document.head.appendChild(link);

    // Registruojame minimalų Service Workerį per Blob, kad įrenginys pripažintų failą kaip PWA
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        const swCode = `
          self.addEventListener('install', (e) => self.skipWaiting());
          self.addEventListener('activate', (e) => e.waitUntil(self.clients.claim()));
          self.addEventListener('fetch', (e) => {
            e.respondWith(fetch(e.request).catch(() => new Response('Offline')));
          });
        `;
        const blob = new Blob([swCode], { type: 'application/javascript' });
        const swUrl = URL.createObjectURL(blob);
        navigator.serviceWorker.register(swUrl).catch(console.error);
      });
    }

        pencil: <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"></path></svg>
      };
      return icons[name] || null;
    };

    function getValidationDiff(tWord, cWord) {
      const m = tWord.length;
      const n = cWord.length;
      const dp = Array(m + 1).fill(null).map(() => Array(n + 1).fill(0));

      for (let i = 0; i <= m; i++) dp[i][0] = i;
      for (let j = 0; j <= n; j++) dp[0][j] = j;

      for (let i = 1; i <= m; i++) {
        for (let j = 1; j <= n; j++) {
          if (tWord[i - 1] === cWord[j - 1]) {
            dp[i][j] = dp[i - 1][j - 1];
          } else {
            dp[i][j] = Math.min(
              dp[i - 1][j - 1] + 1,
              dp[i][j - 1] + 1,    
              dp[i - 1][j] + 1     
            );
          }
        }
      }

      let i = m;
      let j = n;
      const result = [];

      while (i > 0 || j > 0) {
        if (i > 0 && j > 0 && tWord[i - 1] === cWord[j - 1]) {
          result.unshift({ char: cWord[j - 1], status: 'correct', isSpace: false });
          i--; j--;
        } else {
          const sub = (i > 0 && j > 0) ? dp[i - 1][j - 1] : Infinity;
          const ins = (j > 0) ? dp[i][j - 1] : Infinity;
          const del = (i > 0) ? dp[i - 1][j] : Infinity;
          const min = Math.min(sub, ins, del);

          if (min === sub) {
            result.unshift({ char: cWord[j - 1], status: 'incorrect', isSpace: false });
            i--; j--;
          } else if (min === ins) {
            result.unshift({ char: cWord[j - 1], status: 'incorrect', isSpace: false });
            j--;
          } else {
            result.unshift({ char: '_', status: 'missing', isSpace: false });
            i--;
          }
        }
      }
      return result;
    }

    function getValidationDiffByWords(target, current) {
      const tWords = target.split(' ');
      const cWords = current.split(' ');

      const maxWords = Math.max(tWords.length, cWords.length);
      const result = [];
      let cIndex = 0;

      for (let w = 0; w < maxWords; w++) {
        const tWord = tWords[w] || '';
        const cWord = cWords[w] || '';
        
        const wordDiff = getValidationDiff(tWord, cWord);
        for (let item of wordDiff) {
           if (item.status !== 'missing') {
              item.cIndex = cIndex++;
           } else {
              item.cIndex = cIndex; 
           }
        }
        result.push(...wordDiff);

        if (w < maxWords - 1) {
          const spaceInTarget = w < tWords.length - 1;
          const spaceInCurrent = w < cWords.length - 1;

          if (spaceInTarget && spaceInCurrent) {
              result.push({ char: ' ', status: 'correct', isSpace: true, cIndex: cIndex++ });
          } else if (spaceInTarget && !spaceInCurrent) {
              result.push({ char: ' ', status: 'missing', isSpace: true, cIndex: cIndex });
          } else if (!spaceInTarget && spaceInCurrent) {
              result.push({ char: ' ', status: 'incorrect', isSpace: true, cIndex: cIndex++ });
          }
        }
      }
      return result;
    }

    function App() {
      const [gameState, setGameState] = useState('setup'); 
      const [phraseInput, setPhraseInput] = useState('');
      const [phrases, setPhrases] = useState([]);
      
      const [currentIndex, setCurrentIndex] = useState(0);
      const [currentText, setCurrentText] = useState('');
      const [cursorPos, setCursorPos] = useState(0);
      
      const [isTargetVisible, setIsTargetVisible] = useState(true);
      const [feedbackMsg, setFeedbackMsg] = useState('');
      
      const [showColors, setShowColors] = useState(false);
      const [isReviewingErrors, setIsReviewingErrors] = useState(false);

      const [currentAttempts, setCurrentAttempts] = useState(1);
      const [stats, setStats] = useState([]); 

      const [showPinModal, setShowPinModal] = useState(false);
      const [pinValue, setPinValue] = useState('');
      const [pinError, setPinError] = useState(false);
      const [pinAction, setPinAction] = useState(null);

      const utteranceRef = useRef(null);

      const handlePhraseChange = (e) => {
        const val = e.target.value.toUpperCase();
        let filtered = '';
        for(let i=0; i<val.length; i++) {
          if(VALID_CHARS.includes(val[i])) {
            filtered += val[i];
          }
        }
        setPhraseInput(filtered);
      };

      const handleAddPhrase = (e) => {
        e.preventDefault();
        const trimmed = phraseInput.trim();
        if (trimmed) {
          setPhrases([...phrases, trimmed]);
          setPhraseInput('');
        }
      };

      const handleRemovePhrase = (indexToRemove) => {
        setPhrases(phrases.filter((_, idx) => idx !== indexToRemove));
      };

      const handleStartGame = () => {
        if (phrases.length === 0) return;
        setCurrentIndex(0);
        setCurrentText('');
        setCursorPos(0);
        setFeedbackMsg('');
        setShowColors(false);
        setIsReviewingErrors(false);
        setIsTargetVisible(true);
        setCurrentAttempts(1);
        setStats([]);
        setGameState('play');
      };

      const handleKeyPress = useCallback((key) => {
        if (isReviewingErrors) return; 

        let newText = currentText;
        let newPos = cursorPos;

        if (key === 'BACKSPACE') {
          if (cursorPos > 0) {
            newText = currentText.slice(0, cursorPos - 1) + currentText.slice(cursorPos);
            newPos = cursorPos - 1;
          }
        } else if (key === 'SPACE') {
          if (cursorPos > 0 && currentText[cursorPos - 1] !== ' ' && currentText[cursorPos] !== ' ') {
            newText = currentText.slice(0, cursorPos) + ' ' + currentText.slice(cursorPos);
            newPos = cursorPos + 1;
          }
        } else {
          const char = key.toUpperCase();
          if (VALID_CHARS.includes(char)) {
            newText = currentText.slice(0, cursorPos) + char + currentText.slice(cursorPos);
            newPos = cursorPos + 1;
          }
        }

        setCurrentText(newText);
        setCursorPos(newPos);

        if (showColors) {
           const currentTarget = phrases[currentIndex].trim().replace(/\s+/g, ' ');
           const currentInput = newText.trim().toUpperCase();
           if (currentInput === currentTarget) {
               setFeedbackMsg('Puiku! Spausk "Patikrinti" žalią mygtuką! ✨');
           } else {
               setFeedbackMsg('Taisyk klaidas. Teisingos raidės lieka žalios!');
           }
        } else {
           setFeedbackMsg('');
        }
      }, [cursorPos, currentText, isReviewingErrors, showColors, phrases, currentIndex]);

      useEffect(() => {
        const handleKeyDown = (e) => {
          if (showPinModal) return;
          if (gameState === 'setup' && e.key === 'Enter') return;
          if (gameState !== 'play') return;
          if (isReviewingErrors && e.key !== 'Enter') return;
          
          if (e.key === 'Backspace') {
            e.preventDefault();
            handleKeyPress('BACKSPACE');
          } else if (e.key === 'ArrowLeft') {
            if(!isReviewingErrors) setCursorPos((prev) => Math.max(0, prev - 1));
          } else if (e.key === 'ArrowRight') {
            if(!isReviewingErrors) setCursorPos((prev) => Math.min(currentText.length, prev + 1));
          } else if (e.key === ' ') {
            e.preventDefault();
            handleKeyPress('SPACE');
          } else if (e.key.length === 1 && !e.ctrlKey && !e.metaKey && !e.altKey) {
            const char = e.key.toUpperCase();
            if (VALID_CHARS.includes(char)) {
              e.preventDefault();
              handleKeyPress(char);
            }
          } else if (e.key === 'Enter') {
            e.preventDefault();
            if (isReviewingErrors) {
                handleFixErrors();
            } else {
                checkAnswer();
            }
          }
        };

        window.addEventListener('keydown', handleKeyDown);
        return () => window.removeEventListener('keydown', handleKeyDown);
      }, [gameState, cursorPos, currentText, showPinModal, isReviewingErrors, handleKeyPress]);

      const speakText = () => {
        if ('speechSynthesis' in window) {
          window.speechSynthesis.cancel();
          const currentTarget = phrases[currentIndex];
          const utterance = new SpeechSynthesisUtterance(currentTarget);
          utterance.lang = 'lt-LT';
          
          utterance.onend = () => { utteranceRef.current = null; };
          utteranceRef.current = utterance; 
          
          window.speechSynthesis.speak(utterance);
        } else {
          alert('Tavo naršyklė nepalaiko skaitymo balsu funkcijos.');
        }
      };

      const checkAnswer = () => {
        const currentTarget = phrases[currentIndex].trim().replace(/\s+/g, ' ');
        const currentInput = currentText.trim().toUpperCase();

        if (currentInput === currentTarget) {
          setStats([...stats, { phrase: currentTarget, attempts: currentAttempts }]);
          setGameState('success');
          setFeedbackMsg('');
          setShowColors(false);
          setIsReviewingErrors(false);
          return;
        }

        setCurrentAttempts(prev => prev + 1);
        setShowColors(true);
        setIsReviewingErrors(true);
        setFeedbackMsg('Pažiūrėk į klaidas! Spausk oranžinį mygtuką, kad galėtum taisyti.');
      };

      const handleFixErrors = () => {
        setIsReviewingErrors(false);
        setFeedbackMsg('Taisyk klaidas. Teisingos raidės lieka žalios! ✏️');
      };

      const handleNextWord = () => {
        if (currentIndex < phrases.length - 1) {
          setCurrentIndex(prev => prev + 1);
          setCurrentText('');
          setCursorPos(0);
          setCurrentAttempts(1);
          setShowColors(false);
          setIsReviewingErrors(false);
          setGameState('play');
        } else {
          setGameState('summary');
        }
      };

      const handleEyeClick = () => {
        if (isTargetVisible) {
          setIsTargetVisible(false);
        } else {
          setPinAction('showEye');
          setShowPinModal(true);
          setPinValue('');
          setPinError(false);
        }
      };

      const handleSetupClick = () => {
        setPinAction('goSetup');
        setShowPinModal(true);
        setPinValue('');
        setPinError(false);
      };

      const handlePinSubmit = (e) => {
        e.preventDefault();
        if (pinValue === '367') {
          if (pinAction === 'showEye') {
            setIsTargetVisible(true);
          } else if (pinAction === 'goSetup') {
            setGameState('setup');
          }
          setShowPinModal(false);
        } else {
          setPinError(true);
        }
      };

      const renderTextContent = () => {
        if (!currentText && cursorPos === 0 && !showColors) {
           return (
             <div className="absolute inset-0 flex items-center justify-center pointer-events-none opacity-40">
                <span className="text-lg sm:text-2xl text-gray-400 font-medium text-center">Spausk raides apačioje</span>
             </div>
           );
        }

        const cursorEl = (
           <span className="absolute -left-[2px] sm:-left-[3px] top-[10%] bottom-[10%] w-[3px] sm:w-[4px] bg-blue-500 animate-pulse rounded-full z-10"></span>
        );

        if (showColors) {
            const target = phrases[currentIndex].trim().replace(/\s+/g, ' ');
            const diff = getValidationDiffByWords(target, currentText);
            
            const elements = [];
            let currentWordEls = [];
            let cursorRendered = false;

            const flushWord = () => {
              if (currentWordEls.length > 0) {
                elements.push(
                  <span key={`vword-${elements.length}`} className="inline-block whitespace-nowrap">
                    {currentWordEls}
                  </span>
                );
                currentWordEls = [];
              }
            };

            diff.forEach((item, idx) => {
              const isCursorHere = !isReviewingErrors && !cursorRendered && (cursorPos === item.cIndex);
              if (isCursorHere) cursorRendered = true;

              let elContent = null;
              let baseStyles = "relative inline-block "; 

              if (item.isSpace) {
                 flushWord();
                 if (item.status === 'missing') {
                    elContent = <span className="inline-block px-1.5 sm:px-2 text-gray-400 font-bold border-b-[3px] border-gray-400">_</span>;
                 } else if (item.status === 'incorrect') {
                    elContent = <span className="inline-block px-1.5 sm:px-2 bg-red-100 border-b-[3px] border-red-400 rounded-sm">&nbsp;</span>;
                 } else {
                    elContent = <span className="inline-block px-1.5 sm:px-2">&nbsp;</span>;
                 }
              } else {
                 baseStyles += "px-[2px] mx-[1px] font-bold ";
                 if (item.status === 'correct') {
                    baseStyles += "text-green-600";
                    elContent = item.char;
                 } else if (item.status === 'incorrect') {
                    baseStyles += "text-red-500 line-through decoration-red-500 decoration-[3px] opacity-80";
                    elContent = item.char;
                 } else if (item.status === 'missing') {
                    baseStyles += "text-gray-300 font-black";
                    elContent = '_';
                 }
              }

              const onClickHandler = (e) => {
                 if (!isReviewingErrors) {
                     e.stopPropagation();
                     if (item.status !== 'missing') {
                         setCursorPos(item.cIndex + 1);
                     } else {
                         setCursorPos(item.cIndex);
                     }
                 }
              };

              let el = (
                  <span key={`vc-${idx}`} className={baseStyles} onClick={onClickHandler} style={{cursor: isReviewingErrors ? 'default' : 'pointer'}}>
                      {isCursorHere && cursorEl}
                      {elContent}
                  </span>
              );

              if (item.isSpace) {
                  elements.push(el);
              } else {
                  currentWordEls.push(el);
              }
            });
            
            flushWord();

            if (!isReviewingErrors && !cursorRendered && cursorPos === currentText.length) {
                elements.push(
                    <span key="cursor-end" className="relative inline-block h-[1.2em]">
                       {cursorEl}
                    </span>
                );
            }

            return elements;

        } else {
            const elements = [];
            let currentWordChars = [];

            const flushWord = () => {
              if (currentWordChars.length > 0) {
                elements.push(
                  <span key={`word-${elements.length}`} className="inline-block whitespace-nowrap">
                    {currentWordChars}
                  </span>
                );
                currentWordChars = [];
              }
            };

            for (let i = 0; i < currentText.length; i++) {
              const char = currentText[i];
              const isCursorHere = cursorPos === i;

              if (char === ' ') {
                flushWord();
                elements.push(
                  <span key={`space-${i}`} onClick={(e) => { e.stopPropagation(); setCursorPos(i+1); }} className="cursor-pointer inline-block px-1.5 sm:px-2 relative">
                    {isCursorHere && cursorEl}
                    &nbsp;
                  </span>
                );
              } else {
                currentWordChars.push(
                  <span key={`char-${i}`} onClick={(e) => { e.stopPropagation(); setCursorPos(i+1); }} className="cursor-pointer hover:text-blue-500 relative px-[1px] sm:px-[2px]">
                    {isCursorHere && cursorEl}
                    {char}
                  </span>
                );
              }
            }
            flushWord();

            if (cursorPos === currentText.length) {
                elements.push(
                    <span key="cursor-end" className="relative inline-block h-[1.2em]">
                       {cursorEl}
                    </span>
                );
            }

            return elements;
        }
      };

      const keyboardRows = [
        ['Ą', 'Č', 'Ę', 'Ė', 'Į', 'Š', 'Ų', 'Ū', 'Ž'],
        ['Q', 'W', 'E', 'R', 'T', 'Y', 'U', 'I', 'O', 'P'],
        ['A', 'S', 'D', 'F', 'G', 'H', 'J', 'K', 'L'],
        ['Z', 'X', 'C', 'V', 'B', 'N', 'M']
      ];

      return (
        <div className="min-h-screen bg-sky-50 font-sans text-gray-800 flex justify-center selection:bg-sky-200 relative">
          <div className="w-full max-w-2xl bg-white min-h-screen shadow-2xl overflow-hidden flex flex-col relative">
            
            {/* --- SETUP EKRANAS --- */}
            {gameState === 'setup' && (
              <div className="flex flex-col flex-1 p-6 sm:p-8 animate-[fadeIn_0.3s_ease-out]">
                <div className="flex flex-col items-center mb-8">
                  <div className="bg-blue-100 p-4 rounded-full mb-3 relative">
                    <Icon name="settings" className="w-10 h-10 sm:w-12 sm:h-12 text-blue-600" />
                    <Icon name="lock" className="w-5 h-5 absolute bottom-0 right-0 text-blue-800 bg-white rounded-full p-0.5" />
                  </div>
                  <h1 className="text-3xl sm:text-4xl font-extrabold text-blue-600 text-center tracking-tight">
                    Tėvelių zona
                  </h1>
                  <p className="text-gray-500 text-center text-base sm:text-lg mt-2">
                    Sudarykite žodžių ar sakinių sąrašą, kurį vaikas turės parašyti.
                  </p>
                </div>
                
                <form onSubmit={handleAddPhrase} className="w-full flex gap-2 sm:gap-4 mb-6">
                  <input
                    type="text"
                    value={phraseInput}
                    onChange={handlePhraseChange}
                    placeholder="ĮVESKITE FRAZĘ..."
                    className="flex-1 text-xl sm:text-2xl p-4 border-4 border-blue-200 rounded-2xl focus:border-blue-500 focus:outline-none focus:ring-4 focus:ring-blue-100 transition-all uppercase"
                    autoFocus
                  />
                  <button 
                    type="submit"
                    disabled={!phraseInput.trim()}
                    className="bg-blue-500 hover:bg-blue-600 disabled:bg-gray-300 disabled:cursor-not-allowed text-white p-4 rounded-2xl shadow-sm transition-all flex items-center justify-center shrink-0"
                    title="Pridėti"
                  >
                    <Icon name="plus" className="w-8 h-8" />
                  </button>
                </form>

                <div className="flex-1 bg-gray-50 border-2 border-gray-100 rounded-2xl p-4 overflow-y-auto mb-6 shadow-inner">
                  {phrases.length === 0 ? (
                    <div className="h-full flex flex-col items-center justify-center text-gray-400 space-y-3 opacity-70">
                      <Icon name="listOrdered" className="w-12 h-12" />
                      <p className="text-lg">Sąrašas tuščias</p>
                    </div>
                  ) : (
                    <ul className="space-y-3">
                      {phrases.map((phrase, idx) => (
                        <li key={idx} className="flex justify-between items-center bg-white p-4 rounded-xl shadow-sm border border-gray-200">
                          <span className="font-bold text-lg sm:text-xl text-gray-700 uppercase break-words pr-4">
                            {idx + 1}. {phrase}
                          </span>
                          <button
                            onClick={() => handleRemovePhrase(idx)}
                            className="text-red-400 hover:text-red-600 hover:bg-red-50 p-2 rounded-lg transition-colors shrink-0"
                            title="Ištrinti"
                          >
                            <Icon name="trash2" className="w-6 h-6" />
                          </button>
                        </li>
                      ))}
                    </ul>
                  )}
                </div>

                <div className="flex justify-center mt-auto pt-4">
                  <button 
                    onClick={handleStartGame}
                    disabled={phrases.length === 0}
                    className="w-full sm:w-auto bg-green-500 hover:bg-green-600 disabled:bg-gray-300 disabled:cursor-not-allowed text-white text-xl sm:text-2xl font-bold py-4 sm:py-5 px-10 sm:px-16 rounded-full shadow-[0_6px_0_rgb(22,163,74)] hover:shadow-[0_4px_0_rgb(22,163,74)] active:shadow-none active:translate-y-[6px] transition-all flex items-center justify-center gap-3"
                  >
                    <Icon name="play" className="w-6 h-6 sm:w-8 sm:h-8 inline" />
                    Pradėti žaidimą!
                  </button>
                </div>
              </div>
            )}

            {/* --- PLAY EKRANAS --- */}
            {gameState === 'play' && (
              <div className="flex flex-col h-screen max-h-screen overflow-hidden animate-[fadeIn_0.3s_ease-out]">
                <div className="bg-blue-500 text-white p-3 sm:p-4 rounded-b-3xl shadow-md flex flex-col gap-2 sm:gap-4 relative z-10 shrink-0 pt-safe">
                  <div className="flex justify-between items-center px-1 sm:px-2">
                    <button 
                      onClick={handleSetupClick}
                      className="text-blue-100 hover:text-white flex items-center gap-1 text-xs sm:text-sm font-medium bg-blue-600 px-3 py-1.5 rounded-full relative pr-6"
                    >
                      <Icon name="settings" className="w-3 h-3 sm:w-4 sm:h-4 inline" /> Tėveliams
                      <Icon name="lock" className="w-2.5 h-2.5 sm:w-3 sm:h-3 absolute right-2" />
                    </button>
                    <div className="text-blue-100 font-bold bg-blue-600/50 px-4 py-1.5 rounded-full text-sm sm:text-base tracking-widest">
                      {currentIndex + 1} / {phrases.length}
                    </div>
                    <div className="flex gap-2">
                      <button 
                        onClick={speakText}
                        className="p-2 sm:p-3 bg-blue-400 hover:bg-blue-300 rounded-full transition-colors shadow-sm"
                        title="Skaityti balsu"
                      >
                        <Icon name="volume2" className="w-5 h-5 sm:w-6 sm:h-6" />
                      </button>
                      <button 
                        onClick={handleEyeClick}
                        className="p-2 sm:p-3 bg-blue-400 hover:bg-blue-300 rounded-full transition-colors shadow-sm relative"
                      >
                        <Icon name={isTargetVisible ? "eyeOff" : "eye"} className="w-5 h-5 sm:w-6 sm:h-6" />
                        {!isTargetVisible && <Icon name="lock" className="w-3 h-3 absolute bottom-0.5 right-0.5 text-blue-100" />}
                      </button>
                    </div>
                  </div>
                  
                  <div className="text-center flex items-center justify-center pb-2 min-h-[3rem]">
                    {isTargetVisible ? (
                      <h2 className="text-2xl sm:text-4xl font-bold tracking-wide break-words px-2 uppercase line-clamp-2">
                        {phrases[currentIndex]}
                      </h2>
                    ) : (
                      <h2 className="text-xl sm:text-3xl font-medium text-blue-200 italic">
                        Paklausyk ir parašyk!
                      </h2>
                    )}
                  </div>
                </div>

                <div className="flex flex-col items-center justify-center p-3 sm:p-4 w-full shrink-0">
                  <div 
                    className={`w-full max-w-xl bg-white border-4 border-dashed rounded-2xl sm:rounded-3xl p-4 sm:p-6 shadow-inner relative flex items-center justify-center min-h-[100px] sm:min-h-[120px] transition-colors
                      ${isReviewingErrors ? 'border-orange-300 bg-orange-50/50' : 'border-gray-300'}
                    `}
                    onClick={() => {
                      if (!isReviewingErrors) {
                        setCursorPos(currentText.length);
                      }
                    }}
                  >
                    <div className="text-3xl sm:text-4xl lg:text-5xl leading-[1.6] sm:leading-[1.8] text-center w-full select-none font-mono tracking-wide flex flex-wrap justify-center items-center content-center gap-y-2">
                      {renderTextContent()}
                    </div>
                  </div>
                </div>
                
                <div className="h-10 sm:h-12 w-full px-4 flex items-center justify-center shrink-0">
                  {feedbackMsg && (
                    <div className={`px-4 py-2 rounded-xl sm:rounded-2xl font-medium text-sm sm:text-lg shadow-sm border text-center w-full max-w-xl truncate flex items-center justify-center gap-2 animate-in slide-in-from-bottom-2 ${isReviewingErrors ? 'bg-orange-100 text-orange-700 border-orange-200' : 'bg-blue-50 text-blue-700 border-blue-200'}`}>
                      <Icon name={isReviewingErrors ? "xCircle" : "pencil"} className="w-5 h-5 inline" />
                      {feedbackMsg}
                    </div>
                  )}
                </div>

                <div className={`w-full px-1 sm:px-4 flex flex-col gap-1.5 sm:gap-2.5 max-w-xl mx-auto mt-auto pb-2 shrink-0 transition-opacity duration-300 ${isReviewingErrors ? 'opacity-40 pointer-events-none' : 'opacity-100'}`}>
                  {keyboardRows.map((row, rowIndex) => (
                    <div key={rowIndex} className="flex justify-center gap-1 sm:gap-2 w-full">
                      {row.map((key) => (
                        <button
                          key={key}
                          onClick={() => handleKeyPress(key)}
                          className="flex-1 max-w-[45px] sm:max-w-[60px] h-12 sm:h-16 bg-white border-b-[3px] sm:border-b-4 border-gray-200 rounded-lg sm:rounded-xl text-xl sm:text-3xl font-bold text-gray-700 active:border-b-0 active:translate-y-1 active:bg-gray-100 transition-all shadow-sm flex items-center justify-center"
                        >
                          {key}
                        </button>
                      ))}
                    </div>
                  ))}
                  
                  <div className="flex justify-center gap-1.5 sm:gap-2 w-full mt-1 sm:mt-2">
                    <button
                      onClick={() => handleKeyPress('SPACE')}
                      className="flex-1 h-12 sm:h-16 bg-white border-b-[3px] sm:border-b-4 border-gray-200 rounded-lg sm:rounded-xl text-gray-700 active:border-b-0 active:translate-y-1 active:bg-gray-100 transition-all shadow-sm flex items-center justify-center font-bold text-lg sm:text-2xl uppercase tracking-wider"
                    >
                      Tarpas
                    </button>
                    
                    <button
                      onClick={() => handleKeyPress('BACKSPACE')}
                      className="w-16 sm:w-24 h-12 sm:h-16 bg-red-100 border-b-[3px] sm:border-b-4 border-red-300 rounded-lg sm:rounded-xl text-red-700 active:border-b-0 active:translate-y-1 active:bg-red-200 transition-all shadow-sm flex items-center justify-center"
                    >
                      <Icon name="delete" className="w-6 h-6 sm:w-8 sm:h-8" />
                    </button>
                  </div>
                </div>

                <div className="px-2 sm:px-4 mt-2 sm:mt-4 mb-4 sm:mb-6 max-w-xl mx-auto w-full shrink-0 pb-safe">
                  {isReviewingErrors ? (
                    <button
                      onClick={handleFixErrors}
                      className="w-full bg-orange-500 hover:bg-orange-600 text-white text-xl sm:text-3xl font-bold py-3 sm:py-5 rounded-xl sm:rounded-2xl shadow-[0_4px_0_rgb(234,88,12)] sm:shadow-[0_6px_0_rgb(234,88,12)] active:shadow-none active:translate-y-[4px] sm:active:translate-y-[6px] transition-all flex justify-center items-center gap-2 sm:gap-3 uppercase tracking-wide animate-pulse"
                    >
                      <Icon name="pencil" className="w-6 h-6 sm:w-8 sm:h-8 inline" />
                      Taisyti klaidas
                    </button>
                  ) : (
                    <button
                      onClick={checkAnswer}
                      className="w-full bg-green-500 hover:bg-green-600 text-white text-xl sm:text-3xl font-bold py-3 sm:py-5 rounded-xl sm:rounded-2xl shadow-[0_4px_0_rgb(22,163,74)] sm:shadow-[0_6px_0_rgb(22,163,74)] active:shadow-none active:translate-y-[4px] sm:active:translate-y-[6px] transition-all flex justify-center items-center gap-2 sm:gap-3 uppercase tracking-wide"
                    >
                      <Icon name="checkCircle2" className="w-6 h-6 sm:w-8 sm:h-8 inline" />
                      Patikrinti
                    </button>
                  )}
                </div>
              </div>
            )}

            {/* --- SUCCESS EKRANAS --- */}
            {gameState === 'success' && (
              <div className="flex flex-col items-center justify-center flex-1 p-6 sm:p-8 space-y-6 sm:space-y-10 bg-green-50 animate-[zoomIn_0.5s_ease-out]">
                <div className="relative">
                  <div className="absolute inset-0 bg-yellow-300 blur-3xl opacity-50 rounded-full animate-pulse"></div>
                  <Icon name="star" className="w-24 h-24 sm:w-32 sm:h-32 text-yellow-400 fill-current drop-shadow-2xl z-10 relative animate-bounce" />
                </div>
                
                <div className="text-center space-y-3 sm:space-y-4 relative z-10">
                  <h1 className="text-4xl sm:text-6xl font-black text-green-600 drop-shadow-sm uppercase">
                    ŠAUNUOLIS!
                  </h1>
                  <p className="text-xl sm:text-2xl text-gray-600 font-medium">
                    Tu parašei teisingai (iš {currentAttempts} karto!):
                  </p>
                  <div className="bg-white px-6 sm:px-8 py-4 sm:py-6 rounded-2xl sm:rounded-3xl shadow-lg border-2 border-green-100 max-w-full">
                    <p className="text-2xl sm:text-4xl font-bold text-green-600 break-words uppercase flex items-center justify-center gap-2 text-center">
                      <Icon name="check" className="w-8 h-8 shrink-0 inline" />
                      <span>{currentText}</span>
                    </p>
                  </div>
                </div>

                <button
                  onClick={handleNextWord}
                  className="bg-blue-500 hover:bg-blue-600 text-white text-xl sm:text-2xl font-bold py-4 sm:py-5 px-8 sm:px-10 rounded-full shadow-[0_4px_0_rgb(37,99,235)] sm:shadow-[0_6px_0_rgb(37,99,235)] active:shadow-none active:translate-y-[4px] sm:active:translate-y-[6px] transition-all flex items-center gap-2 sm:gap-3 mt-6 sm:mt-8 z-10 uppercase"
                >
                  {currentIndex < phrases.length - 1 ? (
                    <Fragment>
                      <Icon name="refreshCw" className="w-6 h-6 sm:w-8 sm:h-8 inline" />
                      Kitas žodis
                    </Fragment>
                  ) : (
                    <Fragment>
                      <Icon name="trophy" className="w-6 h-6 sm:w-8 sm:h-8 inline" />
                      Žiūrėti rezultatus
                    </Fragment>
                  )}
                </button>
              </div>
            )}

            {/* --- SUMMARY EKRANAS --- */}
            {gameState === 'summary' && (
              <div className="flex flex-col flex-1 p-6 sm:p-8 animate-[fadeIn_0.5s_ease-out] bg-sky-100/50">
                <div className="flex flex-col items-center mb-6">
                  <div className="relative">
                    <div className="absolute inset-0 bg-yellow-300 blur-2xl opacity-60 rounded-full animate-pulse"></div>
                    <Icon name="trophy" className="w-16 h-16 sm:w-20 sm:h-20 text-yellow-500 fill-yellow-400 drop-shadow-xl z-10 relative mb-4" />
                  </div>
                  <h1 className="text-3xl sm:text-5xl font-black text-blue-700 text-center tracking-tight uppercase">
                    Viskas atlikta!
                  </h1>
                  <p className="text-gray-600 text-center text-lg sm:text-xl mt-2 font-medium">
                    Štai kaip sekėsi rašyti:
                  </p>
                </div>

                <div className="flex-1 w-full max-w-xl mx-auto bg-white rounded-3xl shadow-lg border-4 border-blue-100 overflow-hidden flex flex-col mb-6">
                  <div className="overflow-y-auto p-4 sm:p-6 space-y-4">
                    {stats.map((stat, idx) => (
                      <div key={idx} className="flex items-center justify-between bg-gray-50 border border-gray-200 p-4 rounded-2xl">
                        <span className="font-bold text-lg sm:text-xl text-gray-800 break-words pr-4 flex-1">
                          {idx + 1}. {stat.phrase}
                        </span>
                        <div className="flex flex-col items-center justify-center shrink-0 w-24 sm:w-32 bg-white rounded-xl py-2 shadow-sm border border-gray-100">
                          <span className="text-xs sm:text-sm text-gray-400 uppercase font-bold tracking-wider">Iš karto:</span>
                          <span className={`text-2xl sm:text-3xl font-black ${stat.attempts === 1 ? 'text-green-500' : stat.attempts <= 3 ? 'text-orange-400' : 'text-red-500'}`}>
                            {stat.attempts}
                          </span>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>

                <div className="flex justify-center mt-auto pb-safe">
                  <button
                    onClick={handleSetupClick}
                    className="bg-blue-500 hover:bg-blue-600 text-white text-xl sm:text-2xl font-bold py-4 sm:py-5 px-10 sm:px-12 rounded-full shadow-[0_6px_0_rgb(37,99,235)] active:shadow-none active:translate-y-[6px] transition-all flex items-center justify-center gap-3 relative pr-12 w-full sm:w-auto"
                  >
                    <Icon name="settings" className="w-6 h-6 sm:w-8 sm:h-8 inline" />
                    Sukurti naują užduotį
                    <Icon name="lock" className="w-4 h-4 absolute right-6 text-blue-200" />
                  </button>
                </div>
              </div>
            )}

            {/* --- PIN MODALAS --- */}
            {showPinModal && (
              <div className="absolute inset-0 bg-gray-900/60 z-50 flex items-center justify-center backdrop-blur-sm p-4">
                <div className="bg-white p-6 sm:p-8 rounded-3xl shadow-2xl w-full max-w-sm">
                  <div className="flex justify-center mb-4">
                    <div className="bg-orange-100 p-3 sm:p-4 rounded-full">
                      <Icon name="lock" className="w-6 h-6 sm:w-8 sm:h-8 text-orange-500" />
                    </div>
                  </div>
                  <h3 className="text-xl sm:text-2xl font-bold text-center text-gray-800 mb-2">Tėvelių kodas</h3>
                  <p className="text-center text-gray-500 mb-6 text-xs sm:text-sm">
                    Įveskite kodą (367), kad galėtumėte tęsti.
                  </p>
                  
                  <form onSubmit={handlePinSubmit} className="space-y-4">
                    <input
                      type="password"
                      pattern="[0-9]*"
                      inputMode="numeric"
                      value={pinValue}
                      onChange={(e) => setPinValue(e.target.value)}
                      placeholder="***"
                      className={`w-full text-center text-2xl sm:text-3xl tracking-widest p-3 sm:p-4 border-4 rounded-xl sm:rounded-2xl focus:outline-none transition-colors ${
                        pinError ? 'border-red-400 focus:border-red-500 bg-red-50' : 'border-gray-200 focus:border-blue-500'
                      }`}
                      autoFocus
                    />
                    {pinError && <p className="text-red-500 text-center font-medium">Neteisingas kodas!</p>}
                    
                    <div className="flex gap-2 sm:gap-3 pt-2 sm:pt-4">
                      <button
                        type="button"
                        onClick={() => setShowPinModal(false)}
                        className="flex-1 bg-gray-200 hover:bg-gray-300 text-gray-700 font-bold py-3 sm:py-4 rounded-lg sm:rounded-xl transition-colors uppercase tracking-wide text-sm sm:text-base"
                      >
                        Atšaukti
                      </button>
                      <button
                        type="submit"
                        className="flex-1 bg-orange-500 hover:bg-orange-600 text-white font-bold py-3 sm:py-4 rounded-lg sm:rounded-xl transition-colors shadow-lg uppercase tracking-wide text-sm sm:text-base"
                      >
                        Gerai
                      </button>
                    </div>
                  </form>
                </div>
              </div>
            )}

          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
